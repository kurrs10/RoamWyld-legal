<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roam Wyld — Legal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #2a2f38;
      color: #f0ece4;
      line-height: 1.7;
      padding: 0 16px 80px;
    }
    .container { max-width: 680px; margin: 0 auto; padding-top: 60px; }
    .logo { font-size: 13px; font-weight: 800; letter-spacing: 4px; color: #0891b2; text-transform: uppercase; margin-bottom: 8px; }
    h1 { font-size: 28px; font-weight: 800; color: #f0ece4; margin-bottom: 8px; }
    .tagline { font-size: 15px; color: #8a8c94; margin-bottom: 48px; }
    .links { display: flex; flex-direction: column; gap: 12px; }
    .link-card {
      background: #353b45;
      border: 1px solid #4a5260;
      border-radius: 12px;
      padding: 20px 24px;
      text-decoration: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .link-card:hover { border-color: #0891b2; }
    .link-title { font-size: 16px; font-weight: 600; color: #f0ece4; }
    .link-sub { font-size: 13px; color: #5a5d66; margin-top: 2px; }
    .arrow { font-size: 20px; color: #0891b2; }
    footer { margin-top: 60px; font-size: 12px; color: #454850; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Roam Wyld</div>
    <h1>Legal</h1>
    <p class="tagline">Travel smarter. Your data stays yours.</p>

    <div class="links">
      <a href="privacy.html" class="link-card">
        <div>
          <div class="link-title">Privacy Policy</div>
          <div class="link-sub">How we collect, use, and protect your data</div>
        </div>
        <span class="arrow">›</span>
      </a>
      <a href="terms.html" class="link-card">
        <div>
          <div class="link-title">Terms of Service</div>
          <div class="link-sub">Rules for using Roam Wyld</div>
        </div>
        <span class="arrow">›</span>
      </a>
    </div>

    <footer>Roam Wyld &copy; 2026</footer>
  </div>
</body>
</html>
